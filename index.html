<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise</title>
</head>

<body>
    <style>
        .book {
            margin-top: 50px;
            margin-left: 20px;
        }

        h3 {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-size: 32px;

        }

        button {
            padding: 12px 30px;
            border: none;
            color: white;
            background-color: blue;
            border-radius: 6px;
            margin-left: 20px;
        }

        .btn1 {
            background-color: blue;
            cursor: pointer;
        }

        .btn2 {
            background-color: black;
            cursor: pointer;
        }

        .btn3 {
            background-color: transparent;
            color: black;
            border: 1px solid black;
            border-radius: 50px;
            cursor: pointer;
        }

        .btn4 {
            background-color: rgb(194, 9, 123);
            cursor: pointer;
            transition: all 0.3s;

        }

        .btn4:hover {
            background-color: rgb(108, 6, 67);
        }

        .btn5 {
            background-color: rgb(15, 167, 83);
            cursor: pointer;
            transition: all 0.3s;

        }
        .btn5:hover {
            background-color: transparent;
            color: rgb(9, 125, 84);
            /*border:1px solid aquamarine;*/
            outline: 1px solid rgb(12, 120, 84);
        }
        .btn6{
            background-color: transparent;
            color:blue;
            outline:1px solid blue;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn6:hover{
            background-color:rgb(107, 65, 14);
            color:white;
            outline:none;
        }
        .btn7{
            background-color:brown;
            cursor:pointer;
            transition: all 0.3s;
        }
        .btn7:hover{
            transform: scale(1.1);
            background-color:rgb(66, 10, 10);
        }
        .btn8{
            background-color: cadetblue;
            cursor:pointer;
            transition: all 0.3s;
        }
        .btn8:hover{
            transform: rotate(20deg);
            background-color: rgb(6, 73, 75);
        }
        .btn9{
            background-color:rgb(209, 186, 12);
            cursor:pointer;
            transition: all 0.3s;
        }
        .btn9:hover{
            background-color:rgb(139, 128, 12);
            transform:scale(0.9);
        }

    </style>
    <div class="book">
        <h3>Primary</h3>
        <button class="btn1">Primary-btn</button>
        <button class="btn2">Primary-btn</button>
        <button class="btn3">Primary-btn</button>

    </div>
    <div class="book">
        <h3>Primary</h3>
        <button class="btn4">Primary-btn</button>
        <button class="btn5">Primary-btn</button>
        <button class="btn6">Primary-btn</button>

    </div>
    <div class="book">
        <h3>Primary</h3>
        <button class="btn7">Primary-btn</button>
        <button class="btn8">Primary-btn</button>
        <button class="btn9">Primary-btn</button>

    </div>
   
   


</body>

</html>
